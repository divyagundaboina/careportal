kind = "web"
previewPath = "/"
title = "Healthcare Portal"
version = "1.0.0"
id = "artifacts/health-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23483

[services.development]
run = "pnpm --filter @workspace/health-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/health-portal", "run", "build" ]
publicDir = "artifacts/health-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23483"
BASE_PATH = "/"
